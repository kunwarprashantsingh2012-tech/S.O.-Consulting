
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cement Database</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>S.O. Consulting Pvt Ltd</h2>
<nav>
<a href="index.html">Home</a>
<a href="database.html">Cement Database</a>
<a href="map.html">Global Map</a>
</nav>
</header>

<section class="section">

<h2>Sample Cement Plants Database</h2>

<input id="search" placeholder="Search plant/company/country">

<table id="table">

<tr>
<th>Plant</th>
<th>Company</th>
<th>Country</th>
<th>Capacity</th>
</tr>

<tr>
<td>Ste Genevieve</td>
<td>Holcim</td>
<td>USA</td>
<td>5.0 Mt</td>
</tr>

<tr>
<td>Beawar</td>
<td>Shree Cement</td>
<td>India</td>
<td>3.5 Mt</td>
</tr>

<tr>
<td>Wuhu</td>
<td>Anhui Conch</td>
<td>China</td>
<td>4.0 Mt</td>
</tr>

<tr>
<td>Obajana</td>
<td>Dangote Cement</td>
<td>Nigeria</td>
<td>13 Mt</td>
</tr>

</table>

</section>

<script>

const search = document.getElementById("search");

search.addEventListener("keyup", function(){

let filter = search.value.toLowerCase();

document.querySelectorAll("#table tr").forEach(function(row){

let text = row.innerText.toLowerCase();

row.style.display = text.includes(filter) ? "" : "none";

});

});

</script>

</body>
</html>
