
<!DOCTYPE html>
<html>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header>

<h2>S.O. Consulting Pvt Ltd</h2>

<nav>

<a href="index.html">Home</a>
<a href="database.html">Cement Database</a>
<a href="map.html">Global Map</a>

</nav>

</header>

<div id="map"></div>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18,
attribution: '© OpenStreetMap'
}).addTo(map);

L.marker([26.1,74.3]).addTo(map)
.bindPopup("Beawar Cement Plant - India");

L.marker([31.3,118.4]).addTo(map)
.bindPopup("Wuhu Cement Plant - China");

L.marker([37.9,-90.2]).addTo(map)
.bindPopup("Ste Genevieve - USA");

</script>

</body>
</html>
