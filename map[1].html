<div class="title">

<h2>Global Cement Plants Map</h2>

<p>
Interactive map of global cement production facilities using the
Global Energy Monitor dataset.
</p>

</div>


<div id="map"></div>


<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);


// Example markers

L.marker([37.9,-90.2]).addTo(map)
.bindPopup("Ste Genevieve Cement Plant<br>Company: Holcim<br>Country: USA");

L.marker([26.1,74.3]).addTo(map)
.bindPopup("Beawar Cement Plant<br>Company: Shree Cement<br>Country: India");

L.marker([31.3,118.4]).addTo(map)
.bindPopup("Wuhu Cement Plant<br>Company: Anhui Conch<br>Country: China");

L.marker([7.9,6.7]).addTo(map)
.bindPopup("Obajana Cement Plant<br>Company: Dangote Cement<br>Country: Nigeria");

L.marker([53.5,-113.5]).addTo(map)
.bindPopup("Edmonton Cement Plant<br>Company: Heidelberg Materials<br>Country: Canada");

</script>
