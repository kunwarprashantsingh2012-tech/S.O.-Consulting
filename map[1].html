<div class="container">

<h2>Global Cement Plants Map</h2>

<p>
Interactive map of global cement plants using the
Global Energy Monitor dataset.
</p>

</div>

<div id="map"></div>


<script>

document.addEventListener("DOMContentLoaded", function () {

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 18,
attribution: '© OpenStreetMap'
}).addTo(map);


// Test plant markers

L.marker([26.1,74.3]).addTo(map)
.bindPopup("Beawar Cement Plant<br>Shree Cement<br>India");

L.marker([31.3,118.4]).addTo(map)
.bindPopup("Wuhu Cement Plant<br>Anhui Conch<br>China");

L.marker([37.9,-90.2]).addTo(map)
.bindPopup("Ste Genevieve Plant<br>Holcim<br>USA");

L.marker([7.9,6.7]).addTo(map)
.bindPopup("Obajana Plant<br>Dangote Cement<br>Nigeria");

L.marker([53.5,-113.5]).addTo(map)
.bindPopup("Edmonton Plant<br>Heidelberg Materials<br>Canada");

});

</script>
